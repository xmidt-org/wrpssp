---
coverage:
  range: 80..100
  round: down
  precision: 2
  status:
    project:
      default:
        target: auto
        threshold: 0.5%
    patch:
      default:
        target: 90%
        threshold: 0.5%

ignore:
  - "*_test.go"
  - "vendor"
